services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-chat}
      MYSQL_USER: ${MYSQL_USER:-chat_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-chat_app_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-chat_root_password}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/001_create_chat_tables.sql:/docker-entrypoint-initdb.d/001_create_chat_tables.sql:ro
    healthcheck:
      test:
        - CMD-SHELL
        - MYSQL_PWD="$${MYSQL_ROOT_PASSWORD}" mysqladmin ping -h 127.0.0.1 -uroot --silent
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7.0-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      CHAT_CONFIG_PATH: /app/config/server.docker.json
      CHAT_DB_HOST: mysql
      CHAT_DB_PORT: "3306"
      CHAT_DB_USER: ${MYSQL_USER:-chat_app}
      CHAT_DB_PASSWORD: ${MYSQL_PASSWORD:-chat_app_password}
      CHAT_DB_NAME: ${MYSQL_DATABASE:-chat}
      CHAT_REDIS_ENABLED: "1"
      CHAT_REDIS_HOST: redis
      CHAT_REDIS_PORT: "6379"
      CHAT_REDIS_DB: ${REDIS_DATABASE:-0}
      CHAT_SERVER_ID: ${CHAT_SERVER_ID:-server-1}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${CHAT_SERVER_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - nc -z 127.0.0.1 8080
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  mysql-data:
  redis-data:
